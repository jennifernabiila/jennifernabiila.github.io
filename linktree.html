<!DOCTYPE html>
<html lang="en">

<head>
  <title>Tugas pertemuan 5 linktree</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!--font awesome buat logo logo-->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    /* =====body===== */
    body {
      background-color: #b4af9e;
      display: flex;
      justify-content: center;
      font-family: 'Courier Prime', monospace;
    }

    /* =====header utama===== */
    .header-utama {
      background-color: #fff8e0;
      width: 100%;
      max-width: 38rem;
      border-radius: 1.5rem;
      padding: 2rem;
      margin-top: 2rem;
      margin-bottom: 2rem;
      text-align: center;
      height: fit-content;
      box-shadow: 0 0.5rem 1.5rem rgba(0, 0, 0, 0.15); 
    }

    /* =====foto profil===== */
    .header-utama img.rounded-circle {
      width: 6rem;
      height: 6rem;
      object-fit: cover;
      margin-bottom: 1rem;
    }

    /* =====nama===== */
    .header-utama h4 {
      font-weight: 400;
      margin-bottom: 0.5rem;
    }

    /* =====deskripsi===== */
    .header-utama p {
      font-size: 0.9rem;
      color: #555;
      margin-bottom: 1rem;
    }

    /* =====sosmed awesome===== */
    .sosmed a {
      color: black;
      font-size: 1.5rem;
      margin: 0 0.4rem;
      transition: transform 0.2s ease;
      display: inline-block;
    }

    .sosmed a:hover {
      transform: scale(1.2);
      color: #555;
    }

    /* =====tombol link===== */
    .tombol-link {
      background-color: #fff8e0;
      border: 0.08rem solid #ce7a2b;
      border-radius: 3rem;
      padding: 0.7rem 1rem;
      margin-bottom: 0.8rem;
      color: black;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .tombol-link:hover {
      background-color: #f0e8d0;
      color: black;
      text-decoration: none;
    }

    /* =====logo di tombol===== */
    .tombol-link img {
      width: 1rem;
      height: 1rem;
      object-fit: contain;
      margin-right: 0.8rem;
      flex-shrink: 0;
      border-radius: 50%;
    }


    /* =====teks di tombol===== */
    .tombol-link span {
      flex-grow: 1;
      font-size: 0.9rem;
      text-align: center;
    }

    /* =====titik tiga===== */
    .tombol-link .fa-ellipsis-v {
      font-size: 1rem;
      color: #aaa;
      flex-shrink: 0;
    }

    /* =====globe===== */
    .icon-globe {
      font-size: 2rem;
      margin-right: 0.8rem;
      flex-shrink: 0;
      color: black;
    }
  </style>
</head>

<body>
  <div class="header-utama">
    <!--header profil-->
    <img src="https://upload.wikimedia.org/wikipedia/id/f/f1/HokBen_new_logo.png" class="rounded-circle img-fluid"
      alt="HokBen Profile">

    <h4>HokBen</h4>
    <p>Follow Social Media HokBen & Download <br>
      Aplikasi #HokBenAja Untuk Promo Menarik.</p>

    <!--icon social media-->
    <div class="sosmed mt-3">
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
      <a href="#"><i class="fa-brands fa-tiktok"></i></a>
      <a href="#"><i class="fa-brands fa-youtube"></i></a>
      <a href="#"><i class="fa-brands fa-facebook"></i></a>
      <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
    </div>

    <!--tombol link link-->
    <div class="tombol-wrapper mt-4">

      <!--tombol 1-->
      <a href="#" class="tombol-link d-flex align-items-center">
        <img src="https://images.seeklogo.com/logo-png/32/1/shopee-logo-png_seeklogo-326282.png" class="rounded-circle"
          alt="Shopee">
        <span>Official Merchandise HokBen Shopee</span>
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </a>

      <!--tombol 2-->
      <a href="#" class="tombol-link d-flex align-items-center">
        <img src="https://images.seeklogo.com/logo-png/37/1/tokopedia-logo-png_seeklogo-373974.png"
          class="rounded-circle" alt="Tokopedia">
        <span>Official Merchandise HokBen Tokopedia</span>
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </a>

      <!--tombol 3-->
      <a href="#" class="tombol-link d-flex align-items-center">
        <img src="https://upload.wikimedia.org/wikipedia/id/f/f1/HokBen_new_logo.png" class="rounded-circle"
          alt="HokBen Android">
        <span>Order via Apps #hokbenaja di Android</span>
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </a>

      <!--tombol 4-->
      <a href="#" class="tombol-link d-flex align-items-center">
        <img src="https://upload.wikimedia.org/wikipedia/id/f/f1/HokBen_new_logo.png" class="rounded-circle"
          alt="HokBen iOS">
        <span>Order via Apps #hokbenaja di iOS</span>
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </a>

      <!-- Tombol 5 -->
      <a href="#" class="tombol-link d-flex align-items-center">
        <i class="fa-solid fa-globe"></i>
        <span>Order via Website!</span>
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </a>

    </div>
  </div>

  <!--script dibawah biar website ga lambat-->
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
